services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine

  web:
    build: .
    env_file: .env
    volumes: [".:/app", "static_volume:/vol/static", "media_volume:/vol/media"]
    ports: ["8000:8000"]
    depends_on: [db, redis]

  celery:
    build: {context: ., dockerfile: Dockerfile.celery}
    env_file: .env
    volumes: [".:/app", "static_volume:/vol/static", "media_volume:/vol/media"]
    depends_on: [db, redis]

  celery-beat:
    build: {context: ., dockerfile: Dockerfile.celery}
    env_file: .env
    volumes: [".:/app", "static_volume:/vol/static", "media_volume:/vol/media"]
    command: celery -A WaterPark beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on: [db, redis]

volumes:
  postgres_data:
  static_volume:
  media_volume:
