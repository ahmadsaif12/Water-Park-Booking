upstream waterpark_web {
    server web:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://waterpark_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        client_max_body_size 100M;
    }

    location /static/ {
        alias /vol/static/;
    }

    location /media/ {
        alias /vol/media/;
    }

    location /health/ {
        access_log off;
        return 200 'healthy\n';
    }
}
